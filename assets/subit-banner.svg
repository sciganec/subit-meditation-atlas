<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#130F0A"/>
      <stop offset="100%" stop-color="#1C1710"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C8920A"/>
      <stop offset="100%" stop-color="#9E7208"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>
  <rect width="900" height="2" y="198" fill="url(#gold)"/>

  <!-- Mandala rings -->
  <g transform="translate(100,100)" opacity="0.18">
    <circle r="72" fill="none" stroke="#C8920A" stroke-width="0.8"/>
    <circle r="56" fill="none" stroke="#AA2828" stroke-width="0.6"/>
    <circle r="40" fill="none" stroke="#C8920A" stroke-width="0.5"/>
    <circle r="24" fill="none" stroke="#8A9EA8" stroke-width="0.5"/>
    <circle r="8"  fill="none" stroke="#C8920A" stroke-width="0.8"/>
    <!-- cross hairs -->
    <line x1="-72" y1="0" x2="72" y2="0" stroke="#C8920A" stroke-width="0.4" opacity="0.5"/>
    <line x1="0" y1="-72" x2="0" y2="72" stroke="#C8920A" stroke-width="0.4" opacity="0.5"/>
    <line x1="-51" y1="-51" x2="51" y2="51" stroke="#C8920A" stroke-width="0.3" opacity="0.3"/>
    <line x1="51" y1="-51" x2="-51" y2="51" stroke="#C8920A" stroke-width="0.3" opacity="0.3"/>
  </g>

  <!-- 8 trigram dots around mandala -->
  <g transform="translate(100,100)" opacity="0.55">
    <circle cx="0"  cy="-62" r="3" fill="#2E6DB4"/>
    <circle cx="44" cy="-44" r="3" fill="#2E8B57"/>
    <circle cx="62" cy="0"   r="3" fill="#6B8E23"/>
    <circle cx="44" cy="44"  r="3" fill="#B8860B"/>
    <circle cx="0"  cy="62"  r="3" fill="#C0671E"/>
    <circle cx="-44" cy="44" r="3" fill="#A02020"/>
    <circle cx="-62" cy="0"  r="3" fill="#6B1F4A"/>
    <circle cx="-44" cy="-44" r="3" fill="#5B3E8B"/>
  </g>

  <!-- Title -->
  <text x="195" y="90" font-family="Georgia, serif" font-size="38" font-weight="600"
        letter-spacing="8" fill="url(#gold)">SUBIT</text>
  <text x="196" y="116" font-family="Georgia, serif" font-size="14" font-weight="400"
        letter-spacing="3" fill="#F4EDE0" opacity="0.7">Meditation Atlas</text>

  <!-- Formula -->
  <text x="196" y="148" font-family="monospace" font-size="11" letter-spacing="1.5"
        fill="#C8920A" opacity="0.6">WHO × WHERE × WHEN · { 0,1 }⁶ · 64 archetypes</text>

  <!-- Phase pills -->
  <g transform="translate(195, 168)">
    <!-- CITRINITAS -->
    <rect x="0"   y="0" width="100" height="18" rx="9" fill="#C8920A" opacity="0.15"/>
    <text x="50"  y="13" font-family="monospace" font-size="9" letter-spacing="1" fill="#C8920A" text-anchor="middle">ME · CITRINITAS</text>
    <!-- RUBEDO -->
    <rect x="108" y="0" width="88"  height="18" rx="9" fill="#AA2828" opacity="0.15"/>
    <text x="152" y="13" font-family="monospace" font-size="9" letter-spacing="1" fill="#AA2828" text-anchor="middle">WE · RUBEDO</text>
    <!-- NIGREDO -->
    <rect x="204" y="0" width="98"  height="18" rx="9" fill="#506270" opacity="0.15"/>
    <text x="253" y="13" font-family="monospace" font-size="9" letter-spacing="1" fill="#506270" text-anchor="middle">YOU · NIGREDO</text>
    <!-- ALBEDO -->
    <rect x="310" y="0" width="92"  height="18" rx="9" fill="#8A9EA8" opacity="0.15"/>
    <text x="356" y="13" font-family="monospace" font-size="9" letter-spacing="1" fill="#8A9EA8" text-anchor="middle">THEY · ALBEDO</text>
  </g>

  <!-- Right: 6-bit display -->
  <g transform="translate(720, 72)" opacity="0.6">
    <text font-family="monospace" font-size="10" fill="#C8920A" letter-spacing="2">
      <tspan x="0" dy="0">10 10 10  ME · EAST · SPRING</tspan>
      <tspan x="0" dy="14">11 11 11  WE · SOUTH · SUMMER</tspan>
      <tspan x="0" dy="14">01 01 01  YOU · WEST · AUTUMN</tspan>
      <tspan x="0" dy="14">00 00 00  THEY · NORTH · WINTER</tspan>
    </text>
    <text x="0" y="72" font-family="monospace" font-size="9" fill="#C8920A" opacity="0.4">· · · 64 archetypes total · · ·</text>
  </g>
</svg>
