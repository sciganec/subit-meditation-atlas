<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SUBIT · Meditation Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════ RESET ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Dark chrome */
  --void:  #07090D;
  --night: #0E1219;
  --panel: #131720;
  --border-d: rgba(255,255,255,.07);
  /* Light surface */
  --surface: #F4EFE7;
  --page:    #EAE4DA;
  --warm:    #DDD6C8;
  --border-l: rgba(28,20,12,.11);
  /* Text */
  --ink:   #1C1510;
  --muted: #6A5E50;
  --faint: #9E8E7C;
  /* Tradition colours — Buddhist / Hindu / Daoist */
  --b:  #2E5CAA; --b-lt:#6090D8; --b-bg:rgba(46,92,170,.08);
  --h:  #C07A10; --h-lt:#E8A830; --h-bg:rgba(192,122,16,.08);
  --d:  #1B6B4A; --d-lt:#40B87E; --d-bg:rgba(27,107,74,.08);
  /* Alchemical */
  --me:   #C8900A;
  --we:   #A82020;
  --you:  #4A6070;
  --they: #7A9AAA;
  /* Trigram rainbow */
  --t0:#2E6DB4;--t1:#2E8B57;--t2:#6B8E23;--t3:#B8860B;
  --t4:#C0671E;--t5:#A02020;--t6:#6B1F4A;--t7:#5B3E8B;
  /* Typography */
  --serif:'Cinzel',serif;
  --body: 'Cormorant Garamond',Georgia,serif;
  --ui:   'Inter',system-ui,sans-serif;
  --mono: 'JetBrains Mono',monospace;
  /* Layout */
  --nav: 66px;
  --det: 390px;
  --hdr: 52px;
  --r:   6px;
}

html,body{height:100%;font-family:var(--body);background:var(--void);color:var(--ink);font-size:16px;line-height:1.6}

/* ═══════════ SHELL ═══════════ */
#app{
  display:grid;
  grid-template-columns:var(--nav) 1fr var(--det);
  grid-template-rows:var(--hdr) 1fr;
  height:100vh;
  opacity:0;transition:opacity .5s;
}
#app.show{opacity:1}

/* ═══════════ TOPBAR ═══════════ */
.tb{
  grid-column:1/-1;
  background:var(--night);
  border-bottom:1px solid var(--border-d);
  display:flex;align-items:center;
  padding:0 1.2rem;gap:.9rem;
  position:relative;z-index:50;
}
.tb-logo{
  font-family:var(--serif);font-size:1rem;font-weight:600;
  letter-spacing:.26em;color:var(--h-lt);
  text-shadow:0 0 28px rgba(232,168,48,.35);
}
.tb-formula{
  font-family:var(--ui);font-size:.62rem;font-weight:400;
  letter-spacing:.04em;color:rgba(232,168,48,.32);
}
/* Tradition filter pills in topbar */
.tb-trads{display:flex;gap:.35rem;margin-left:.4rem}
.tbp{
  font-family:var(--mono);font-size:.48rem;letter-spacing:.1em;
  padding:.16rem .5rem;border-radius:20px;
  border:1px solid currentColor;
  opacity:.4;cursor:pointer;
  transition:opacity .18s,background .18s;
}
.tbp:hover{opacity:.8}
.tbp.on{opacity:1;background:rgba(255,255,255,.08)}
.tbp.tb-b{color:var(--b-lt)}
.tbp.tb-h{color:var(--h-lt)}
.tbp.tb-d{color:var(--d-lt)}
/* Counter */
.tb-right{margin-left:auto}
.tb-count{
  font-family:var(--mono);font-size:.58rem;
  color:rgba(232,168,48,.4);
  background:rgba(232,168,48,.06);
  padding:.18rem .5rem;border-radius:20px;
  border:1px solid rgba(232,168,48,.1);
}
/* Bottom progress stripe */
.tb-stripe{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--b-lt),var(--h-lt),var(--d-lt))}

/* ═══════════ SIDEBAR ═══════════ */
.sidebar{
  background:var(--night);
  border-right:1px solid var(--border-d);
  display:flex;flex-direction:column;
  padding:.4rem 0;z-index:30;overflow:hidden;
}
/* Main nav */
.nv{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.18rem;padding:.65rem 0;width:100%;
  border:none;background:transparent;
  border-left:2px solid transparent;
  cursor:pointer;color:rgba(255,255,255,.22);
  transition:color .17s,background .17s,border-color .17s;
  font-family:var(--mono);
}
.nv:hover{color:rgba(255,255,255,.55);background:rgba(255,255,255,.03)}
.nv.on{color:var(--h-lt);border-left-color:var(--h-lt);background:rgba(232,168,48,.05)}
.nv-ic{font-size:1rem;line-height:1}
.nv-lb{font-family:var(--ui);font-size:.58rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;opacity:.7}
.nsep{height:1px;background:var(--border-d);margin:.25rem .6rem}
.nsec-lbl{
  font-family:var(--ui);font-size:.55rem;font-weight:500;letter-spacing:.06em;
  color:rgba(255,255,255,.25);text-align:center;
  padding:.22rem 0 .08rem;text-transform:uppercase;
}
.nsec{padding:.25rem .28rem;display:flex;flex-direction:column;gap:.16rem}
/* Sidebar filter pills */
.spill{
  display:flex;flex-direction:column;align-items:center;gap:.07rem;
  padding:.38rem .12rem;border-radius:var(--r);
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.025);
  cursor:pointer;color:rgba(255,255,255,.28);
  transition:all .17s;width:100%;font-family:var(--mono);
}
.spill:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15)}
.spill.on{border-color:currentColor;background:rgba(255,255,255,.055)}
.sp-ic{font-size:.88rem;line-height:1}
.sp-lb{font-family:var(--ui);font-size:.52rem;font-weight:500;letter-spacing:.04em;opacity:.85}

/* ═══════════ MAIN PANEL ═══════════ */
.main{background:var(--surface);overflow-y:auto;overflow-x:hidden;position:relative}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:rgba(28,20,12,.14);border-radius:2px}
.tab{display:none}
.tab.on{display:block}

/* ── Filter bar ── */
.fbar{
  position:sticky;top:0;z-index:20;
  background:var(--page);
  border-bottom:1px solid var(--border-l);
  padding:.6rem 1.2rem;
  display:flex;flex-wrap:wrap;gap:.55rem;align-items:flex-end;
  box-shadow:0 2px 8px rgba(28,20,12,.06);
}
.fg{display:flex;flex-direction:column;gap:.2rem}
.fg-lbl{
  font-family:var(--ui);font-size:.65rem;font-weight:500;letter-spacing:.04em;
  color:var(--faint);text-transform:uppercase;
}
.fg-row{display:flex;gap:.26rem;flex-wrap:wrap}
.fchip{
  display:flex;align-items:center;gap:.28rem;
  padding:.3rem .65rem;border-radius:20px;
  border:1.5px solid var(--border-l);
  background:white;color:var(--muted);
  font-family:var(--ui);font-size:.8rem;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.fchip:hover{border-color:rgba(192,122,16,.35);color:var(--ink);background:var(--warm)}
.fchip.on{color:white;border-color:transparent;box-shadow:0 2px 10px rgba(0,0,0,.16)}
.fsep{width:1px;background:var(--border-l);align-self:stretch;flex-shrink:0}
.fclear{
  padding:.26rem .58rem;border-radius:20px;
  border:1.5px solid var(--border-l);background:transparent;
  color:var(--faint);font-family:var(--ui);font-size:.7rem;font-weight:400;
  letter-spacing:.02em;cursor:pointer;transition:all .15s;
  align-self:flex-end;
}
.fclear:hover{border-color:var(--h);color:var(--h)}
.fclear.hide{visibility:hidden}

/* ── Atlas grid ── */
.atlas-body{padding:.9rem 1.1rem 3rem}
.phase-sec{margin-bottom:1.4rem}
.phase-hdr{
  display:flex;align-items:center;gap:.5rem;
  padding:.44rem .75rem;border-radius:var(--r);
  margin-bottom:.5rem;
  transition:filter .18s;cursor:default;
}
.ph-gl{font-size:1.05rem}
.ph-name{font-family:var(--serif);font-size:.82rem;font-weight:500;letter-spacing:.08em}
.ph-who{font-family:var(--mono);font-size:.56rem;opacity:.55;margin-left:.2rem}
.ph-desc{font-style:italic;font-size:.7rem;margin-left:auto;opacity:.55;max-width:220px;text-align:right}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:6px}

.card{
  position:relative;background:white;
  border-radius:var(--r);border:1.5px solid rgba(0,0,0,.07);
  padding:.6rem .55rem .5rem;cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;gap:.25rem;min-height:96px;
  transition:transform .13s ease,box-shadow .13s ease,border-color .13s ease;
}
.card:hover{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,.1)}
.card.sel{
  transform:translateY(-3px);border-width:2px;
}
.card.t-buddhist.sel{border-color:var(--b);box-shadow:0 0 0 3px rgba(46,92,170,.15),0 5px 20px rgba(0,0,0,.1)}
.card.t-hindu.sel   {border-color:var(--h);box-shadow:0 0 0 3px rgba(192,122,16,.15),0 5px 20px rgba(0,0,0,.1)}
.card.t-daoist.sel  {border-color:var(--d);box-shadow:0 0 0 3px rgba(27,107,74,.15), 0 5px 20px rgba(0,0,0,.1)}

.c-top{display:flex;align-items:center;gap:.25rem}
.c-num{font-family:var(--mono);font-size:.48rem;color:var(--faint)}
.c-coords{display:flex;gap:.16rem;margin-left:auto}
.c-coord{
  font-family:var(--mono);font-size:.46rem;
  padding:.03rem .2rem;border-radius:3px;
  background:rgba(0,0,0,.05);color:var(--muted);
}
.c-trad{
  font-family:var(--mono);font-size:.4rem;letter-spacing:.07em;
  padding:.05rem .3rem;border-radius:3px;
  width:fit-content;opacity:.8;
}
.card.t-buddhist .c-trad{background:var(--b-bg);color:var(--b)}
.card.t-hindu    .c-trad{background:var(--h-bg);color:var(--h)}
.card.t-daoist   .c-trad{background:var(--d-bg);color:var(--d)}
.c-name{
  font-family:var(--body);font-size:.8rem;font-weight:600;
  line-height:1.3;flex:1;display:flex;align-items:flex-end;
  min-height:2.2em;
}
.c-foot{display:flex;align-items:center;gap:.22rem;margin-top:.04rem}
.c-bits{font-family:var(--mono);font-size:.42rem;color:rgba(0,0,0,.17);letter-spacing:.05em;flex:1}
.c-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.c-stripe{position:absolute;bottom:0;left:0;right:0;height:3px}

/* ═══════════ DETAIL PANEL ═══════════ */
.det{
  background:var(--panel);
  border-left:1px solid var(--border-d);
  overflow-y:auto;display:flex;flex-direction:column;
}
.det::-webkit-scrollbar{width:3px}
.det::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.det-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:.8rem;padding:2.5rem;text-align:center;
}
.det-empty-ic{font-size:2.8rem;opacity:.07;animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.det-empty-h{font-family:var(--ui);font-size:.9rem;font-weight:500;letter-spacing:.05em;color:rgba(255,255,255,.25)}
.det-empty-s{font-family:var(--mono);font-size:.53rem;letter-spacing:.1em;color:rgba(255,255,255,.1);line-height:1.9}

/* Detail content */
.det-tbar{height:3px;flex-shrink:0}
.det-head{padding:1rem 1.1rem .8rem;border-bottom:1px solid var(--border-d);flex-shrink:0}
.det-phase{
  display:inline-flex;align-items:center;gap:.32rem;
  font-family:var(--mono);font-size:.55rem;letter-spacing:.2em;
  padding:.18rem .55rem;border-radius:20px;
  border:1px solid currentColor;margin-bottom:.65rem;
}
.det-chips{display:flex;gap:.32rem;flex-wrap:wrap;margin-bottom:.45rem}
.det-chip{
  display:flex;align-items:center;gap:.26rem;
  font-size:.74rem;padding:.18rem .5rem;
  border:1px solid rgba(255,255,255,.1);border-radius:5px;
  color:rgba(255,255,255,.55);font-family:var(--body);
}
.det-ic{font-size:.66rem;opacity:.65}
.det-bits{display:flex;align-items:center;gap:.38rem;flex-wrap:wrap}
.bits-raw{font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;color:rgba(255,255,255,.15)}
.tgp{font-family:var(--mono);font-size:.52rem;padding:.07rem .4rem;border-radius:10px;letter-spacing:.04em}

.det-body{padding:.9rem 1.1rem 1.5rem;flex:1}
.d-name{font-family:var(--body);font-size:1.2rem;font-weight:600;line-height:1.28;margin-bottom:.16rem}
.d-tag{font-style:italic;font-size:.8rem;color:rgba(255,255,255,.33);margin-bottom:.28rem}
.d-tlab{
  display:inline-flex;align-items:center;gap:.32rem;
  font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;
  padding:.14rem .48rem;border-radius:3px;margin-bottom:.85rem;
}
.d-meta{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.85rem}
.d-f{display:flex;flex-direction:column;gap:.08rem}
.d-fl{font-family:var(--ui);font-size:.6rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.32);margin-bottom:.05rem}
.d-fv{font-family:var(--ui);font-size:.82rem;color:rgba(255,255,255,.75);line-height:1.5}
/* History block */
.d-hist{
  padding:.6rem .8rem;border-radius:var(--r);
  margin-bottom:.85rem;border:1px solid rgba(255,255,255,.07);
}
.d-hist-h{
  display:flex;align-items:center;gap:.35rem;
  font-family:var(--mono);font-size:.48rem;letter-spacing:.18em;
  text-transform:uppercase;margin-bottom:.3rem;
  opacity:.8;
}
.d-hist-t{font-size:.82rem;line-height:1.82;color:rgba(255,255,255,.62);font-style:italic}
/* Sections */
.d-sec{margin-bottom:.85rem}
.d-sh{font-family:var(--mono);font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.26rem;opacity:.7}
.d-txt{font-size:.87rem;line-height:1.82;color:rgba(255,255,255,.78)}
.d-instr{font-style:italic;color:rgba(255,255,255,.83)}
.d-mantra{
  padding:.58rem .88rem;border-radius:0 var(--r) var(--r) 0;
  border-left:2px solid currentColor;
  font-size:.96rem;font-family:var(--body);font-style:italic;
  line-height:1.5;margin-bottom:.82rem;
}
.d-vars{display:flex;flex-direction:column;gap:.18rem;margin-bottom:.72rem}
.d-var{
  display:flex;align-items:baseline;gap:.45rem;
  font-size:.8rem;color:rgba(255,255,255,.58);padding:.1rem 0;
}
.d-var::before{content:'◦';opacity:.45;flex-shrink:0;font-size:.72rem}
.d-closes{
  font-size:.74rem;color:rgba(255,255,255,.28);
  font-style:italic;line-height:1.65;
  border-top:1px solid rgba(255,255,255,.06);
  padding-top:.62rem;
}

/* ═══════════ THEORY ═══════════ */
/* Theory tab: flex column, topnav sticky */
#tab-theory.on{display:flex;flex-direction:column}
.t-topnav{
  flex-shrink:0;
  background:var(--page);
  border-bottom:2px solid var(--border-l);
  display:flex;padding:0 1.4rem;gap:0;
  box-shadow:0 2px 8px rgba(28,20,12,.06);
}
.tnb{
  display:flex;align-items:center;gap:.38rem;
  padding:.65rem .85rem;border:none;background:transparent;
  font-family:var(--ui);font-size:.82rem;font-weight:500;
  color:var(--muted);cursor:pointer;
  border-bottom:2.5px solid transparent;margin-bottom:-2px;
  transition:color .17s,border-color .17s;white-space:nowrap;
}
.tnb:hover{color:var(--ink)}
.tnb.on{color:var(--ink);border-bottom-color:currentColor}
.tnb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .17s}
.tnb.on .tnb-dot{transform:scale(1.35)}
.tnb.tb{color:var(--b)}.tnb.tb.on{border-bottom-color:var(--b)}
.tnb.th{color:var(--h)}.tnb.th.on{border-bottom-color:var(--h)}
.tnb.td{color:var(--d)}.tnb.td.on{border-bottom-color:var(--d)}

.t-scroll-area{flex:1;overflow-y:auto;background:var(--surface)}
.t-scroll-area::-webkit-scrollbar{width:4px}
.t-scroll-area::-webkit-scrollbar-thumb{background:rgba(28,20,12,.14);border-radius:2px}
.t-body{padding:1.4rem 1.6rem 3rem;max-width:880px}

/* Sections */
.t-sec{display:none;animation:tfade .22s ease}
.t-sec.on{display:block}
@keyframes tfade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.t-hd{
  font-family:var(--serif);font-size:1rem;font-weight:500;
  letter-spacing:.07em;color:var(--ink);
  margin:0 0 .65rem;padding-bottom:.38rem;
  border-bottom:1px solid var(--border-l);
}
.t-intro{
  font-size:.88rem;line-height:1.82;color:#4A3C2A;
  font-style:italic;border-left:3px solid var(--h);
  padding:.28rem 0 .28rem .88rem;margin-bottom:1rem;
}

/* Taxonomy cards */
.t-taxo{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1rem}
.t-ti{
  background:white;border-radius:var(--r);
  border:1px solid var(--border-l);
  padding:.55rem .8rem;
  display:grid;grid-template-columns:24px 1fr auto;
  align-items:start;gap:.5rem;
  transition:background .14s;
}
.t-ti:hover{background:var(--page)}
.t-tn{font-family:var(--mono);font-size:.62rem;color:var(--h);font-weight:500;padding-top:.1rem}
.t-tb .t-tnm{font-family:var(--body);font-size:.88rem;font-weight:600;margin-bottom:.12rem}
.t-tb .t-tmc{font-size:.79rem;color:var(--muted);line-height:1.5}
.t-tq{font-family:var(--mono);font-size:.53rem;color:var(--faint);font-style:italic;text-align:right;padding-top:.12rem;white-space:nowrap}

/* Axes cards */
.t-axes{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.5rem;margin-bottom:.9rem}
.t-ac{
  background:white;border-radius:var(--r);
  border:1px solid var(--border-l);
  padding:.6rem .75rem;transition:box-shadow .15s;
}
.t-ac:hover{box-shadow:0 3px 12px rgba(0,0,0,.08)}
.t-ac-h{display:flex;align-items:center;gap:.38rem;margin-bottom:.25rem}
.t-ac-sym{font-size:.95rem;line-height:1}
.t-ac-name{font-family:var(--serif);font-size:.8rem;font-weight:500}
.t-ac-bits{font-family:var(--mono);font-size:.56rem;color:var(--muted);margin-left:auto}
.t-ac-desc{font-size:.76rem;color:var(--muted);line-height:1.5;font-style:italic}
.t-ac-sub{font-size:.7rem;color:var(--faint);margin-top:.15rem}

/* Tradition header */
.t-trad-card{
  display:flex;align-items:flex-start;gap:.75rem;
  padding:.75rem .95rem;border-radius:var(--r);
  margin-bottom:.75rem;border:1px solid rgba(0,0,0,.07);
}
.t-trad-icon{font-size:1.5rem;line-height:1;flex-shrink:0;margin-top:.1rem}
.t-trad-nm{font-family:var(--serif);font-size:.95rem;font-weight:500;margin-bottom:.18rem}
.t-trad-desc{font-size:.8rem;line-height:1.6;color:var(--muted)}
.t-schools{display:flex;gap:.28rem;flex-wrap:wrap;margin-top:.32rem}
.t-school{
  font-family:var(--mono);font-size:.48rem;letter-spacing:.07em;
  padding:.08rem .38rem;border-radius:3px;
  background:rgba(0,0,0,.05);color:var(--muted);
}

/* Practice accordion */
.t-pracs{display:flex;flex-direction:column}
.tpi{border:1px solid var(--border-l);border-top:none;background:white;transition:background .13s}
.tpi:first-child{border-top:1px solid var(--border-l);border-radius:var(--r) var(--r) 0 0}
.tpi:last-child{border-radius:0 0 var(--r) var(--r)}
.tpi:hover:not(.open){background:var(--page)}
.tpi.open{background:rgba(0,0,0,.008)}

.tpi-hd{
  display:grid;
  grid-template-columns:28px 1fr auto 28px;
  align-items:center;gap:.5rem;
  padding:.72rem .95rem;cursor:pointer;
  user-select:none;
}
.tpi-hd:hover .tpi-tags{display:flex;gap:.25rem;align-items:center;flex-shrink:0}
.tpi-arr{opacity:.8}
.tpi-num{font-family:var(--mono);font-size:.53rem;color:var(--faint)}

const S={tab:'atlas',filter:{who:null,where:null,when:null,trad:null},sel:null};

// ── helpers ──
function enc6(wi,ri,ni){return(wi.toString(2).padStart(2,'0')+ri.toString(2).padStart(2,'0')+ni.toString(2).padStart(2,'0')).split('').map(Number)}
function trigs(b){return[parseInt(b.slice(0,3).join(''),2),parseInt(b.slice(3).join(''),2)]}
function x(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
const mob=()=>window.innerWidth<=820;

// ── sidebar filters ──
function renderSidebar(){
  const WM={ME:{g:'☽',c:'var(--me)'},WE:{g:'☀',c:'var(--we)'},YOU:{g:'☾',c:'var(--you)'},THEY:{g:'❊',c:'var(--they)'}};
  const DM={EAST:{s:'↑',c:'#B8860B'},SOUTH:{s:'→',c:'#8B2500'},WEST:{s:'↓',c:'#1B5E6A'},NORTH:{s:'←',c:'#374247'}};
  const SM={SPRING:{s:'○',l:'Вс',c:'#5D7A3E'},SUMMER:{s:'●',l:'Лт',c:'#8B6914'},AUTUMN:{s:'◑',l:'Ос',c:'#7A4022'},WINTER:{s:'◯',l:'Зм',c:'#2B4F6E'}};
  const f=S.filter;
  const pill=(cls,ic,lb,on,color,cb)=>
    `<button class="${cls}${on?' on':''}" style="${on?`color:${color};border-color:${color}`:''}" onclick="${cb}">
      <span class="sp-ic">${ic}</span><span class="sp-lb">${lb}</span></button>`;
  document.getElementById('sb-who').innerHTML=
    ['ME','WE','YOU','THEY'].map(w=>pill('spill',WM[w].g,WM[w].m,f.who===w,WM[w].c,`setF('who','${w}')`)).join('');
  document.getElementById('sb-where').innerHTML=
    ['EAST','SOUTH','WEST','NORTH'].map(w=>pill('spill',DM[w].s,w[0],f.where===w,DM[w].c,`setF('where','${w}')`)).join('');
  document.getElementById('sb-when').innerHTML=
    ['SPRING','SUMMER','AUTUMN','WINTER'].map(w=>pill('spill',SM[w].s,SM[w].l,f.when===w,SM[w].c,`setF('when','${w}')`)).join('');
}

// ── filter bar ──
function renderFbar(){
  const f=S.filter, hasAny=f.who||f.where||f.when;
  const chip=(label,on,bg,cb)=>
    `<button class="fchip${on?' on':''}" style="${on?`background:${bg}`:''}" onclick="${cb}">${label}</button>`;
  document.getElementById('fbar').innerHTML=`
    <div class="fg"><div class="fg-lbl">Хто практикує</div><div class="fg-row">
      ${['ME','WE','YOU','THEY'].map(w=>{const p=PHASES[w],on=f.who===w;
        return chip(`${p.glyph} ${p.name} <span style="font-family:var(--mono);font-size:.62rem;opacity:.5">${w} · ${p.bits}</span>`,on,p.color,`setF('who','${w}')`);
      }).join('')}</div></div>
    <div class="fsep"></div>
    <div class="fg"><div class="fg-lbl">Напрям · Елемент</div><div class="fg-row">
      ${['EAST','SOUTH','WEST','NORTH'].map(w=>{const d=DIRS[w],on=f.where===w;
        return chip(`${d.sym} ${w} <span style="font-size:.7rem;opacity:.65">· ${d.el}</span>`,on,d.color,`setF('where','${w}')`);
      }).join('')}</div></div>
    <div class="fsep"></div>
    <div class="fg"><div class="fg-lbl">Сезон · Енергія</div><div class="fg-row">
      ${['SPRING','SUMMER','AUTUMN','WINTER'].map(w=>{const s=SEAS[w],on=f.when===w;
        return chip(`${s.sym} ${s.lbl}`,on,s.color,`setF('when','${w}')`);
      }).join('')}</div></div>
    <button class="fclear${hasAny?'':' hide'}" onclick="clearF()">✕ Скинути фільтри</button>`;
}

// ── atlas grid ──
function matches(a){
  const f=S.filter;
  if(f.who   && f.who  !==a.who)   return false;
  if(f.where && f.where!==a.where) return false;
  if(f.when  && f.when !==a.when)  return false;
  if(f.trad  && f.trad !==a.trad)  return false;
  return true;
}

function renderAtlas(){
  const TC=['#2E6DB4','#2E8B57','#6B8E23','#B8860B','#C0671E','#A02020','#6B1F4A','#5B3E8B'];
  const TN=['Blue','Green','Lime','Amber','Orange','Crimson','Burgundy','Violet'];
  const WL=['ME','WE','YOU','THEY'], RL=['EAST','SOUTH','WEST','NORTH'], NL=['SPRING','SUMMER','AUTUMN','WINTER'];
  let html='';
  WL.forEach(who=>{
    const ph=PHASES[who];
    const cells=MAP64.filter(a=>a.who===who&&matches(a));
    if(!cells.length)return;
    html+=`<div class="phase-sec">
      <div class="phase-hdr" style="background:${ph.bg};border-left:3px solid ${ph.color}">
        <span class="ph-gl">${ph.glyph}</span>
        <span class="ph-name" style="color:${ph.color}">${ph.name}</span>
        <span class="ph-who" style="color:${ph.color}">· ${who} · ${ph.bits}</span>
        <span class="ph-desc">${ph.desc}</span>
      </div><div class="card-grid">`;
    cells.forEach(a=>{
      const bits=enc6(WL.indexOf(a.who),RL.indexOf(a.where),NL.indexOf(a.when));
      const [hi,lo]=trigs(bits);
      const prac=PD[a.id], isSel=S.sel?.id===a.id;
      const tc=TRAD_C[a.trad]||TRAD_C.buddhist;
      const tl=a.trad==='buddhist'?'Buddhist':a.trad==='hindu'?'Hindu':'Daoist';
      html+=`<div class="card t-${a.trad}${isSel?' sel':''}" onclick="pickArch('${a.id}')">
        <div class="c-top">
          <span class="c-num">#${String(a.idx).padStart(2,'0')}</span>
          <div class="c-coords">
            <span class="c-coord">${DIRS[a.where].sym}${a.where[0]}</span>
            <span class="c-coord">${SEAS[a.when].sym}${a.when.slice(0,2)}</span>
          </div>
        </div>
        <span class="c-trad">${tl}</span>
        <div class="c-name" style="color:${ph.color}">${x(prac?prac.name:a.prac)}</div>
        <div class="c-foot">
          <span class="c-bits">${bits.join('')}</span>
          <span class="c-dot" style="background:${tc.md}"></span>
        </div>
        <div class="c-stripe" style="background:linear-gradient(90deg,${TC[hi]},${TC[lo]})"></div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('atlas').innerHTML=html||
    '<div style="padding:2.5rem;color:var(--muted);font-style:italic;text-align:center;font-size:.9rem">Немає архетипів за обраними фільтрами</div>';
}

// ── detail panel ──
function buildDetail(a){
  const TC=['#2E6DB4','#2E8B57','#6B8E23','#B8860B','#C0671E','#A02020','#6B1F4A','#5B3E8B'];
  const TN=['Blue','Green','Lime','Amber','Orange','Crimson','Burgundy','Violet'];
  const WL=['ME','WE','YOU','THEY'], RL=['EAST','SOUTH','WEST','NORTH'], NL=['SPRING','SUMMER','AUTUMN','WINTER'];
  const ph=PHASES[a.who], d=DIRS[a.where], s=SEAS[a.when], prac=PD[a.id];
  const bits=enc6(WL.indexOf(a.who),RL.indexOf(a.where),NL.indexOf(a.when));
  const [hi,lo]=trigs(bits);
  const tc=TRAD_C[a.trad]||TRAD_C.buddhist;
  if(!prac)return`<div style="padding:2rem;color:rgba(255,255,255,.3);font-style:italic">Дані відсутні</div>`;
  return`
    <div class="det-tbar" style="background:linear-gradient(90deg,${tc.md},${tc.lt})"></div>
    <div class="det-head">
      <div class="det-phase" style="color:${ph.color}">${ph.glyph} &nbsp;${ph.name}</div>
      <div class="det-chips">
        <div class="det-chip"><span class="det-ic">${ph.glyph}</span>${a.who}</div>
        <div class="det-chip"><span class="det-ic">${d.sym}</span>${a.where} &middot; ${d.el}</div>
        <div class="det-chip"><span class="det-ic">${s.sym}</span>${a.when} &middot; ${s.en}</div>
      </div>
      <div class="det-bits">
        <span class="bits-raw">${bits.join(' ')}</span>
        <span class="tgp" style="background:${TC[hi]}22;color:${TC[hi]};border:1px solid ${TC[hi]}44">▲${bits.slice(0,3).join('')} ${TN[hi]}</span>
        <span class="tgp" style="background:${TC[lo]}22;color:${TC[lo]};border:1px solid ${TC[lo]}44">▽${bits.slice(3).join('')} ${TN[lo]}</span>
      </div>
    </div>
    <div class="det-body">
      <div class="d-name" style="color:${tc.lt}">${x(prac.name)}</div>
      <div class="d-tag">${x(prac.tagline)}</div>
      <div class="d-tlab" style="background:${tc.bg};color:${tc.lt}">◈ ${x(tc.lbl)} &nbsp;·&nbsp; ${x(prac.trad||'')}</div>
      <div class="d-meta">
        <div class="d-f"><div class="d-fl">Тривалість</div><div class="d-fv">${x(prac.duration)}</div></div>
        <div class="d-f"><div class="d-fl">Поза</div><div class="d-fv">${x(prac.posture)}</div></div>
        ${prac.bodyNote?`<div class="d-f" style="grid-column:1/-1"><div class="d-fl">Тіло · Дихання</div><div class="d-fv">${x(prac.bodyNote)}</div></div>`:''}
      </div>
      <div class="d-hist" style="background:${tc.bg};border-color:${tc.md}22">
        <div class="d-hist-h" style="color:${tc.lt}"><span>◎</span> Історичний контекст</div>
        <div class="d-hist-t">${x(prac.history||'')}</div>
      </div>
      <div class="d-sec">
        <div class="d-sh" style="color:${tc.lt}">Інструкція</div>
        <div class="d-txt d-instr">${x(prac.instruction)}</div>
      </div>
      <div class="d-mantra" style="color:${tc.lt};border-color:${tc.lt}">${x(prac.mantra)}</div>
      <div class="d-sec">
        <div class="d-sh" style="color:${tc.lt}">Варіанти практики</div>
        <div class="d-vars">${(prac.variants||[]).map(v=>`<div class="d-var">${x(v)}</div>`).join('')}</div>
      </div>
      ${prac.closes?`<div class="d-closes">${x(prac.closes)}</div>`:''}
    </div>`;
}

function renderDetail(){
  const el=document.getElementById('detail');
  if(!S.sel){
    el.innerHTML=`<div class="det-empty">
      <div class="det-empty-ic">⬡</div>
      <div class="det-empty-h">Оберіть архетип</div>
      <div class="det-empty-s">Натисніть на картку<br>в атласі або практику<br>в теорії</div>
    </div>`;
    return;
  }
  el.innerHTML=buildDetail(S.sel);
}
function renderSheet(){
  if(!S.sel)return;
  document.getElementById('dsheet-content').innerHTML=buildDetail(S.sel);
}

        <span class="t-tq">${t.q}</span>
      </div>`).join('')}
    </div>
  </div>`;

  const secAxes=`<div class="t-sec" id="s-axes">
    <div class="t-hd">Три осі SUBIT</div>
    <p class="t-intro">SUBIT = WHO × WHERE × WHEN. Чотири режими: PRIME · SYNC · SCAN · CORE. 2⁶ = 64 архетипи.</p>
    <div class="t-hd" style="font-size:.85rem;margin-top:1.2rem">WHO — Режим (PRIME · SYNC · SCAN · CORE) b₁b₂</div>
    <div class="t-axes">${['ME','WE','YOU','THEY'].map(w=>{const p=PHASES[w];return`
      <div class="t-ac">
        <div class="t-ac-h"><span class="t-ac-sym">${p.glyph}</span>
          <span class="t-ac-name" style="color:${p.color}">${w}</span>
          <span class="t-ac-bits">${p.bits}</span></div>
        <div class="t-ac-desc" style="color:${p.color}">${p.name}</div>
        <div class="t-ac-sub">${p.desc}</div>
      </div>`;}).join('')}</div>
    <div class="t-hd" style="font-size:.85rem;margin-top:1.2rem">WHERE — Просторовий Вектор b₃b₄</div>
    <div class="t-axes">${['EAST','SOUTH','WEST','NORTH'].map(w=>{const d=DIRS[w];return`
      <div class="t-ac">
        <div class="t-ac-h"><span class="t-ac-sym" style="color:${d.color}">${d.sym}</span>
          <span class="t-ac-name" style="color:${d.color}">${w}</span>
          <span class="t-ac-bits">b₃b₄</span></div>
        <div class="t-ac-desc">${d.el}</div>
        <div class="t-ac-sub">${d.qi}</div>
      </div>`;}).join('')}</div>
    <div class="t-hd" style="font-size:.85rem;margin-top:1.2rem">WHEN — Часова Якість b₅b₆</div>
    <div class="t-axes">${['SPRING','SUMMER','AUTUMN','WINTER'].map(w=>{const s=SEAS[w];return`
      <div class="t-ac">
        <div class="t-ac-h"><span class="t-ac-sym" style="color:${s.color}">${s.sym}</span>
          <span class="t-ac-name" style="color:${s.color}">${w}</span>
          <span class="t-ac-bits">b₅b₆</span></div>
        <div class="t-ac-desc">${s.lbl}</div>
        <div class="t-ac-sub">${s.en}</div>
      </div>`;}).join('')}</div>
  </div>`;

  document.getElementById('theory').innerHTML=
    secTaxo + secAxes + TRADS.map(tg=>tradHTML(tg)).join('');
}

function switchTheory(id){
  ['taxo','axes','buddhist','hindu','daoist'].forEach(k=>{
    const s=document.getElementById('s-'+k); if(s)s.classList.remove('on');
    const b=document.getElementById('tn-'+k); if(b)b.classList.remove('on');
  });
  const s=document.getElementById('s-'+id); if(s)s.classList.add('on');
  const b=document.getElementById('tn-'+id); if(b)b.classList.add('on');
  const sa=document.querySelector('.t-scroll-area'); if(sa)sa.scrollTop=0;
}
function togTPI(id){document.getElementById('tpi-'+id)?.classList.toggle('open');}

// ── navigation ──
function switchTab(t){
  S.tab=t;
  document.querySelectorAll('.tab').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nv').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('nv-'+t).classList.add('on');
}
function setF(axis,val){
  S.filter[axis]=S.filter[axis]===val?null:val;
  renderSidebar();renderFbar();renderAtlas();
}
function clearF(){
  S.filter={who:null,where:null,when:null,trad:null};
  document.querySelectorAll('.tbp').forEach(b=>b.classList.remove('on'));
  renderSidebar();renderFbar();renderAtlas();
}
function filterTrad(t){
  S.filter.trad=S.filter.trad===t?null:t;
  document.querySelectorAll('.tbp').forEach(b=>b.classList.remove('on'));
  if(S.filter.trad)document.getElementById('tbadge-'+t)?.classList.add('on');
  renderAtlas();
}
function pickArch(id){
  S.sel=MAP64.find(a=>a.id===id)||null;
  renderAtlas();
  if(mob()){renderSheet();document.getElementById('dsheet').classList.add('open');}
  else renderDetail();
}
function closeSheet(){document.getElementById('dsheet').classList.remove('open');}
function openInAtlas(who,where,when){
  S.sel=MAP64.find(a=>a.id===`${who}-${where}-${when}`)||null;
  switchTab('atlas');renderAtlas();renderDetail();
  if(S.sel)setTimeout(()=>document.querySelector('.card.sel')?.scrollIntoView({behavior:'smooth',block:'center'}),80);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('app').classList.add('show');
  renderSidebar();renderFbar();renderAtlas();renderTheory();renderDetail();
});

</script>
</body></html>
